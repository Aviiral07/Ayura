<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments | Ayura</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#0a9e8a;--teal-l:#12c4ab;--teal-d:#077a6b;
  --navy:#0b1e34;--navy2:#112844;--navy3:#0e2240;
  --white:#fff;--muted:rgba(255,255,255,0.5);--border:rgba(255,255,255,0.08);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(11,30,52,0.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;
  justify-content:space-between;height:64px;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--white);text-decoration:none;letter-spacing:-0.03em;}
.nav-logo span{color:var(--teal-l);}
.nav-links{display:flex;gap:0.5rem;list-style:none;align-items:center;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;
  padding:0.45rem 0.9rem;border-radius:8px;transition:all 0.2s;}
.nav-links a:hover{color:var(--white);background:rgba(255,255,255,0.06);}
.nav-links a.active{color:var(--white);background:rgba(10,158,138,0.15);color:var(--teal-l);}
.nav-links .logout{color:#e74c3c !important;}
.nav-links .logout:hover{background:rgba(231,76,60,0.1) !important;color:#e74c3c !important;}

/* PAGE WRAP */
.page{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem;}

/* PAGE HEADER */
.page-header{margin-bottom:2.5rem;}
.page-header .badge{display:inline-block;background:rgba(10,158,138,0.15);border:1px solid rgba(10,158,138,0.3);
  color:var(--teal-l);font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  padding:0.3rem 0.9rem;border-radius:50px;margin-bottom:0.8rem;}
.page-header h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;
  letter-spacing:-0.03em;margin-bottom:0.4rem;}
.page-header p{color:var(--muted);font-size:0.95rem;font-weight:300;}

/* CARDS */
.card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:1.8rem;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:1.2rem;
  padding-bottom:0.8rem;border-bottom:1px solid var(--border);}

/* FORM ELEMENTS */
.form-group{margin-bottom:1.3rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.55);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5rem;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:0.8rem 1rem;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--white);
  font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,background 0.2s;}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.2);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--teal);background:rgba(255,255,255,0.09);}
.form-group select option{background:#1a3a5c;color:var(--white);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* BUTTONS */
.btn-primary{background:var(--teal);color:var(--white);border:none;padding:0.85rem 1.5rem;
  border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;width:100%;}
.btn-primary:hover{background:var(--teal-l);transform:translateY(-2px);box-shadow:0 8px 25px rgba(10,158,138,0.3);}
.btn-primary:disabled{background:rgba(255,255,255,0.1);cursor:not-allowed;transform:none;box-shadow:none;}

/* RESULT */
.result{margin-top:1.5rem;padding:1.2rem;border-radius:12px;text-align:center;display:none;font-weight:600;}
.result-ok{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);color:#2ecc71;}
.result-err{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;}
.result-icon{font-size:2rem;display:block;margin-bottom:0.5rem;}
.result-detail{margin-top:0.6rem;font-size:0.82rem;font-weight:400;opacity:0.8;line-height:1.6;}

/* SPINNER */
.spinner-wrap{display:none;text-align:center;padding:1rem;}
.spinner{border:3px solid rgba(255,255,255,0.1);border-top:3px solid var(--teal);
  border-radius:50%;width:32px;height:32px;animation:spin 0.8s linear infinite;margin:0 auto 0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;
  color:rgba(255,255,255,0.25);font-size:0.82rem;margin-top:3rem;}

/* RESPONSIVE */
@media(max-width:640px){
  .form-row{grid-template-columns:1fr;}
  .nav-links .hide-mob{display:none;}
  .page{padding:1.5rem 1rem;}
}
</style>

</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">Ayu<span>ra</span></a>
    <ul class="nav-links">
      
      <li><a href="patient_dashboard.html">🏠 Dashboard</a></li>
      <li><a href="verification.html" class="hide-mob">🏥 Verify</a></li>
      <li><a href="appointment.html" class="active" class="hide-mob">📅 Appointments</a></li>
      <li><a href="chatbot.html" class="hide-mob">🤖 Chatbot</a></li>
      <li><a href="login.html" class="logout">Logout</a></li>
    </ul>
  </nav>
  
<div class="page">
  <div class="page-header">
    <div class="badge">Appointments</div>
    <h1>📅 Book an Appointment</h1>
    <p>Schedule your visit with a verified medical professional.</p>
  </div>
  <div class="card">
    <div class="card-title">Appointment Details</div>
    <form id="apptForm">
      <div class="form-row">
        <div class="form-group">
          <label>Your Full Name *</label>
          <input type="text" id="pname" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
      </div>
      <div class="form-group">
        <label>Select Verified Doctor *</label>
        <select id="doc" required>
          <option value="">Choose a Doctor</option>
          <option>Dr. Rajesh Kumar — Cardiology (Maharashtra)</option>
          <option>Dr. Priya Sharma — Pediatrics (Delhi)</option>
          <option>Dr. Amit Patel — General Medicine (Gujarat)</option>
          <option>Dr. Sunita Reddy — Dermatology (Karnataka)</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Preferred Date *</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label>Preferred Time *</label>
          <input type="time" id="time" required>
        </div>
      </div>
      <div class="form-group">
        <label>Reason for Visit</label>
        <textarea id="reason" rows="3" placeholder="e.g., Routine checkup, fever since 3 days..."></textarea>
      </div>
      <button type="submit" class="btn-primary">✅ Confirm Appointment</button>
    </form>
    <div class="result" id="apptResult"></div>
  </div>
</div>
<script>
document.getElementById("apptForm").addEventListener("submit",function(e){
  e.preventDefault();
  const res=document.getElementById("apptResult");
  const doc=document.getElementById("doc").value;
  const date=document.getElementById("date").value;
  const time=document.getElementById("time").value;
  res.style.display="block";
  res.className="result result-ok";
  res.innerHTML=`<span class="result-icon">✅</span><strong>Appointment Confirmed!</strong><div class="result-detail">Doctor: ${doc}<br>Date: ${date} at ${time}<br>A confirmation has been sent to your email.</div>`;
  this.reset();
  res.scrollIntoView({behavior:"smooth"});
});
</script>
  <footer>&copy; 2025 Ayura Healthcare Platform &nbsp;|&nbsp; All rights reserved.</footer>
</body>
</html>
