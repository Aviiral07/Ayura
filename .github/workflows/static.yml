name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Write all frontend files
        run: |
          mkdir -p frontend/ayura-ui
          echo  | base64 -d > frontend/ayura-ui/package.json
          echo  | base64 -d > frontend/ayura-ui/tsconfig.json
          echo  | base64 -d > frontend/ayura-ui/index.html
          echo aW1wb3J0IFJlYWN0IGZyb20gInJlYWN0IjsKaW1wb3J0IHsgY3JlYXRlUm9vdCB9IGZyb20gInJlYWN0LWRvbS9jbGllbnQiOwppbXBvcnQgeyBBcHAgfSBmcm9tICIuL0FwcCI7CmNvbnN0IGNvbnRhaW5lciA9IGRvY3VtZW50LmdldEVsZW1lbnRCeUlkKCJyb290Iik7CmNvbnN0IHJvb3QgPSBjcmVhdGVSb290KGNvbnRhaW5lcik7CnJvb3QucmVuZGVyKDxBcHAgLz4pOw== | base64 -d > frontend/ayura-ui/index.tsx
          echo  | base64 -d > frontend/ayura-ui/App.tsx
          echo  | base64 -d > frontend/ayura-ui/Navbar.tsx
          echo  | base64 -d > frontend/ayura-ui/Landing.tsx
          echo  | base64 -d > frontend/ayura-ui/Login.tsx

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
